spring.application.name=user-microservice

server.port=0

spring.cloud.config.enabled=false

spring.mongodb.uri=mongodb://localhost:27017/users

# KEYCLOAK (RESOURCE SERVER)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/armory-realm

# Logging opcional
logging.level.org.springframework.security=DEBUG

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.uuid}

# Rabbit mq
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Roles
security.roles.admin=system-admin
security.roles.manager=inventory-manager
security.roles.soldier=soldier
security.roles.public-access=public-access