########################################
# APPLICATION
########################################

spring.application.name=api-gateway
server.port=8080

########################################
# EUREKA
########################################

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://discovery-service.railway.internal:8761/eureka

eureka.instance.instance-id=${spring.application.name}:${random.uuid}
eureka.instance.prefer-ip-address=true

########################################
# GATEWAY
########################################

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

########################################
# IMAGE SERVICE
########################################

spring.cloud.gateway.server.webflux.routes[0].id=image-microservice
spring.cloud.gateway.server.webflux.routes[0].uri=lb://IMAGE-MICROSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/images/**

########################################
# WEAPON SERVICE
########################################

spring.cloud.gateway.server.webflux.routes[1].id=weapon-microservice
spring.cloud.gateway.server.webflux.routes[1].uri=lb://WEAPON-MICROSERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/armory/**,/items/**

########################################
# USER SERVICE
########################################

spring.cloud.gateway.server.webflux.routes[2].id=user-microservice
spring.cloud.gateway.server.webflux.routes[2].uri=lb://USER-MICROSERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/user/**,/admin/user/**

########################################
# LOCATION SERVICE
########################################

spring.cloud.gateway.server.webflux.routes[3].id=location-microservice
spring.cloud.gateway.server.webflux.routes[3].uri=lb://LOCATION-MICROSERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/organization/locations/**

########################################
# GLOBAL CORS
########################################

spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=https://sistema-logistica-militar.netlify.app

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].maxAge=3600

########################################
# KEYCLOAK / JWT
########################################

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://keycloak-production-d501.up.railway.app/realms/armory-realm

########################################
# REDIS
########################################

spring.data.redis.host=redis.railway.internal
spring.data.redis.port=6379
spring.data.redis.timeout=3000ms

########################################
# RABBITMQ
########################################

spring.rabbitmq.host=rabbitmq.railway.internal
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

spring.rabbitmq.connection-timeout=5000

########################################
# ACTUATOR
########################################

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

########################################
# LOGGING
########################################

logging.level.root=INFO

logging.level.org.springframework.cloud.gateway=DEBUG

logging.level.org.springframework.security=INFO

logging.level.org.springframework.web=INFO

logging.level.reactor.netty=INFO

########################################
# REACTOR NETTY
########################################

spring.codec.max-in-memory-size=10MB

########################################
# JACKSON
########################################

spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false