<div class="font-['Barlow'] text-[#c8d4e0] bg-[#0d1117] flex flex-col h-full">

  <app-item-header 
      [title]="`Military logistics software`"
      [subtitle]="`Edit Password`"
  >
    <app-ui-button label="CONFIRM" variant="primary" (pressed)="submitForm()" />
    <app-ui-button label="← Back" variant="danger" (pressed)="cancel()" />
  </app-item-header>

  <div class="flex-1 overflow-y-auto min-h-0 px-8 py-6">
    <div class="max-w-4xl mx-auto bg-[#111418] border border-[#1e2530]">

      <!-- Section header -->
      <div class="flex items-center gap-3 px-5 py-[14px] border-b border-[#1e2530] bg-[#0f1318]">
        <div class="w-[6px] h-[6px] bg-[#00e5a0] shrink-0"></div>
        <span class="font-['Share_Tech_Mono'] text-[11px] text-[#00e5a0] uppercase tracking-[3px]">
          CHANGE PASSWORD
        </span>
      </div>

      <div class="p-8 flex flex-col gap-6 max-w-md">

        <!-- Current password -->
        <div class="flex flex-col gap-2">
          <label class="font-['Share_Tech_Mono'] text-[10px] text-[#4a5568] uppercase tracking-[2px]">
            Current Password
          </label>
          <input
            type="password"
            [(ngModel)]="currentPassword"
            class="w-full bg-[#0d1117] border text-[#617089] font-['Share_Tech_Mono'] text-[13px] px-3 py-[9px] outline-none transition-colors duration-150 placeholder:text-[#2a3340]"
            [style.border-color]="errors.current ? '#ff3b3b' : '#1e2530'"
            (focus)="$event.target.style.borderColor='#00e5a0'"
            (blur)="$event.target.style.borderColor=errors.current ? '#ff3b3b' : '#1e2530'"
          />
          <span *ngIf="errors.current" class="font-['Share_Tech_Mono'] text-[10px] text-[#ff3b3b] tracking-[1px]">
            {{ errors.current }}
          </span>
        </div>

        <!-- New password -->
        <div class="flex flex-col gap-2">
          <label class="font-['Share_Tech_Mono'] text-[10px] text-[#4a5568] uppercase tracking-[2px]">
            New Password
          </label>
          <input
            type="password"
            [(ngModel)]="newPassword"
            class="w-full bg-[#0d1117] border text-[#617089] font-['Share_Tech_Mono'] text-[13px] px-3 py-[9px] outline-none transition-colors duration-150 placeholder:text-[#2a3340]"
            [style.border-color]="errors.new ? '#ff3b3b' : '#1e2530'"
            (focus)="$event.target.style.borderColor='#00e5a0'"
            (blur)="$event.target.style.borderColor=errors.new ? '#ff3b3b' : '#1e2530'"
          />
          <span *ngIf="errors.new" class="font-['Share_Tech_Mono'] text-[10px] text-[#ff3b3b] tracking-[1px]">
            {{ errors.new }}
          </span>
        </div>

        <!-- Confirm password -->
        <div class="flex flex-col gap-2">
          <label class="font-['Share_Tech_Mono'] text-[10px] text-[#4a5568] uppercase tracking-[2px]">
            Confirm New Password
          </label>
          <input
            type="password"
            [(ngModel)]="confirmPassword"
            class="w-full bg-[#0d1117] border text-[#617089] font-['Share_Tech_Mono'] text-[13px] px-3 py-[9px] outline-none transition-colors duration-150 placeholder:text-[#2a3340]"
            [style.border-color]="errors.confirm ? '#ff3b3b' : '#1e2530'"
            (focus)="$event.target.style.borderColor='#00e5a0'"
            (blur)="$event.target.style.borderColor=errors.confirm ? '#ff3b3b' : '#1e2530'"
          />
          <span *ngIf="errors.confirm" class="font-['Share_Tech_Mono'] text-[10px] text-[#ff3b3b] tracking-[1px]">
            {{ errors.confirm }}
          </span>
        </div>

        <!-- API error -->
        <div *ngIf="apiError" class="border border-[#ff3b3b20] bg-[#1a0f10] px-4 py-3">
          <span class="font-['Share_Tech_Mono'] text-[11px] text-[#ff3b3b] tracking-[1px]">
            ✕ {{ apiError }}
          </span>
        </div>

      </div>
    </div>
  </div>

  <decorative-footer />

</div>
