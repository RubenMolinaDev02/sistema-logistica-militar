@for (section of model.sections; track section.title) {

  <div class="border border-[#1e2530] rounded-xl p-4 mb-6">

    <h2 class="text-[#00e5a0] text-[12px] uppercase mb-4">
      {{ section.title }}
    </h2>

    <div class="flex flex-col gap-4">

      @for (field of section.fields; track field.key) {

        <app-dynamic-field
          [(value)]="field.value"
          [field]="field"
        />

      }

    </div>

  </div>

}
